<a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
<header class="navbar" [class.scrolled]="isScrolled()">
  <div class="container">
    <div class="navbar__inner">
      <a href="#inicio" class="navbar__logo">
        <img
          src="assets/images/logo-nova/logo-horizontal-subtitulo.png"
          alt="GeoMAG Topografia e Projetos"
        />
      </a>

      <ul class="navbar__nav" [class.navbar__nav--open]="isMenuOpen()">
        @for (link of navLinks; track link) {
          <li>
            <a [href]="link.href" (click)="closeMenu()">{{ link.label }}</a>
          </li>
        }
      </ul>

      <div class="navbar__actions">
        <a
          [href]="whatsappUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="btn btn--primary btn--sm"
        >
          Solicitar Orçamento
        </a>
      </div>

      <button
        class="navbar__hamburger"
        [class.navbar__hamburger--active]="isMenuOpen()"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen()"
        aria-label="Menu de navegação"
      >
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
